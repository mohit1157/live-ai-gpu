AWSTemplateFormatVersion: "2010-09-09"
Description: >
  LiveAI Platform - GPU Instance Stack.
  Launches a g5.xlarge EC2 instance with the Deep Learning AMI, security
  groups for GPU service ports, an IAM role with ECR pull permissions,
  and an optional Elastic IP.

# ===========================================================================
# Parameters
# ===========================================================================
Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 key pair for SSH access.

  ECRRegistry:
    Type: String
    Description: ECR registry URL (e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com).

  InstanceType:
    Type: String
    Default: g5.xlarge
    AllowedValues:
      - g5.xlarge
      - g5.2xlarge
      - g5.4xlarge
      - g4dn.xlarge
      - p3.2xlarge
    Description: GPU instance type. g5.xlarge (A10G, 24GB VRAM) recommended.

  VolumeSize:
    Type: Number
    Default: 200
    MinValue: 100
    MaxValue: 1000
    Description: Root EBS volume size in GB. Models need ~100GB.

  AllowSSHFrom:
    Type: String
    Default: "0.0.0.0/0"
    Description: CIDR block allowed to SSH. Restrict to your IP for security.

  APIServerCIDR:
    Type: String
    Default: "0.0.0.0/0"
    Description: >
      CIDR block of the API server allowed to access GPU service ports
      (8001-8004). In production, set this to the API server's IP/32.

  AllocateElasticIP:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Whether to allocate an Elastic IP for a stable public address.

# ===========================================================================
# Conditions
# ===========================================================================
Conditions:
  CreateEIP: !Equals [!Ref AllocateElasticIP, "true"]

# ===========================================================================
# Mappings - Deep Learning AMI IDs per region
# ===========================================================================
Mappings:
  RegionAMI:
    us-east-1:
      AMI: ami-0c7217cdde317cfec  # Deep Learning AMI GPU PyTorch 2.1 (Ubuntu 22.04)
    us-east-2:
      AMI: ami-0c7217cdde317cfec
    us-west-1:
      AMI: ami-0c7217cdde317cfec
    us-west-2:
      AMI: ami-0c7217cdde317cfec
    eu-west-1:
      AMI: ami-0c7217cdde317cfec
    ap-southeast-1:
      AMI: ami-0c7217cdde317cfec

# ===========================================================================
# Resources
# ===========================================================================
Resources:

  # -------------------------------------------------------------------------
  # Security Group
  # -------------------------------------------------------------------------
  GPUSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: LiveAI GPU instance security group
      Tags:
        - Key: Name
          Value: liveai-gpu-sg
      SecurityGroupIngress:
        # SSH access
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowSSHFrom
          Description: SSH access

        # Avatar service (port 8001)
        - IpProtocol: tcp
          FromPort: 8001
          ToPort: 8001
          CidrIp: !Ref APIServerCIDR
          Description: Avatar service

        # Voice service (port 8002)
        - IpProtocol: tcp
          FromPort: 8002
          ToPort: 8002
          CidrIp: !Ref APIServerCIDR
          Description: Voice service

        # Expression service (port 8003)
        - IpProtocol: tcp
          FromPort: 8003
          ToPort: 8003
          CidrIp: !Ref APIServerCIDR
          Description: Expression service

        # Streaming service (port 8004)
        - IpProtocol: tcp
          FromPort: 8004
          ToPort: 8004
          CidrIp: !Ref APIServerCIDR
          Description: Streaming service

  # -------------------------------------------------------------------------
  # IAM Role with ECR pull permissions
  # -------------------------------------------------------------------------
  GPUInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: liveai-gpu-instance-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
      Policies:
        - PolicyName: liveai-ecr-pull
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - "arn:aws:s3:::liveai-assets"
                  - "arn:aws:s3:::liveai-assets/*"

  GPUInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref GPUInstanceRole

  # -------------------------------------------------------------------------
  # EC2 Instance
  # -------------------------------------------------------------------------
  GPUInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [RegionAMI, !Ref "AWS::Region", AMI]
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref GPUInstanceProfile
      SecurityGroupIds:
        - !GetAtt GPUSecurityGroup.GroupId
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: !Ref VolumeSize
            VolumeType: gp3
            Iops: 6000
            Throughput: 400
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: liveai-gpu
        - Key: Project
          Value: liveai
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail

          # Log output for debugging
          exec > >(tee /var/log/liveai-setup.log) 2>&1

          echo "=== LiveAI GPU Instance UserData ==="
          echo "Region: ${AWS::Region}"
          echo "ECR: ${ECRRegistry}"

          # Wait for cloud-init to finish
          cloud-init status --wait || true

          # Export for the setup script
          export ECR_REGISTRY="${ECRRegistry}"
          export AWS_REGION="${AWS::Region}"

          # Download and run setup script (if not already run via SSH)
          # The setup-instance.sh will be SCPed by deploy.sh, but this
          # provides a fallback for CloudFormation-only deploys.
          if [ ! -f /tmp/setup-complete ]; then
            # Install Docker if needed (Deep Learning AMI usually has it)
            if ! command -v docker &>/dev/null; then
              apt-get update -qq
              apt-get install -y -qq docker.io
              systemctl enable docker
              systemctl start docker
              usermod -aG docker ubuntu
            fi

            # Install NVIDIA Container Toolkit if needed
            if ! dpkg -l | grep -q nvidia-container-toolkit; then
              distribution=$(. /etc/os-release; echo "$ID$VERSION_ID")
              curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey \
                | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
              curl -s -L "https://nvidia.github.io/libnvidia-container/$distribution/libnvidia-container.list" \
                | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' \
                | tee /etc/apt/sources.list.d/nvidia-container-toolkit.list > /dev/null
              apt-get update -qq
              apt-get install -y -qq nvidia-container-toolkit
              nvidia-ctk runtime configure --runtime=docker
              systemctl restart docker
            fi

            # Login to ECR and pull images
            aws ecr get-login-password --region ${AWS::Region} \
              | docker login --username AWS --password-stdin ${ECRRegistry}

            for svc in avatar voice expression streaming; do
              docker pull ${ECRRegistry}/liveai/$svc:latest || true
            done

            # Start containers
            docker network create liveai-net 2>/dev/null || true
            PORT=8001
            for svc in avatar voice expression streaming; do
              docker run -d \
                --name liveai-$svc \
                --gpus all \
                --network liveai-net \
                -p $PORT:$PORT \
                --restart unless-stopped \
                -e SERVICE_PORT=$PORT \
                -e NVIDIA_VISIBLE_DEVICES=all \
                --shm-size=2g \
                ${ECRRegistry}/liveai/$svc:latest || true
              PORT=$((PORT + 1))
            done

            touch /tmp/setup-complete
          fi

          # Signal CloudFormation that setup is complete
          /opt/aws/bin/cfn-signal -e $? \
            --stack ${AWS::StackName} \
            --resource GPUInstance \
            --region ${AWS::Region} || true

    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M

  # -------------------------------------------------------------------------
  # Elastic IP (optional)
  # -------------------------------------------------------------------------
  ElasticIP:
    Type: AWS::EC2::EIP
    Condition: CreateEIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: liveai-gpu-eip

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Condition: CreateEIP
    Properties:
      InstanceId: !Ref GPUInstance
      EIP: !Ref ElasticIP

# ===========================================================================
# Outputs
# ===========================================================================
Outputs:
  InstanceId:
    Description: EC2 instance ID
    Value: !Ref GPUInstance

  PublicIP:
    Description: Public IP address of the GPU instance
    Value: !If
      - CreateEIP
      - !Ref ElasticIP
      - !GetAtt GPUInstance.PublicIp

  AvatarServiceURL:
    Description: Avatar service URL
    Value: !Sub
      - "http://${IP}:8001"
      - IP: !If [CreateEIP, !Ref ElasticIP, !GetAtt GPUInstance.PublicIp]

  VoiceServiceURL:
    Description: Voice service URL
    Value: !Sub
      - "http://${IP}:8002"
      - IP: !If [CreateEIP, !Ref ElasticIP, !GetAtt GPUInstance.PublicIp]

  ExpressionServiceURL:
    Description: Expression service URL
    Value: !Sub
      - "http://${IP}:8003"
      - IP: !If [CreateEIP, !Ref ElasticIP, !GetAtt GPUInstance.PublicIp]

  StreamingServiceURL:
    Description: Streaming service URL
    Value: !Sub
      - "http://${IP}:8004"
      - IP: !If [CreateEIP, !Ref ElasticIP, !GetAtt GPUInstance.PublicIp]

  SSHCommand:
    Description: SSH command to connect to the instance
    Value: !Sub
      - "ssh -i ~/.ssh/${KeyPairName}.pem ubuntu@${IP}"
      - IP: !If [CreateEIP, !Ref ElasticIP, !GetAtt GPUInstance.PublicIp]

  SecurityGroupId:
    Description: Security group ID
    Value: !GetAtt GPUSecurityGroup.GroupId
